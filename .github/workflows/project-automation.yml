name: "Project Automation (Move to In Progress)"

on:
  issues:
    types: [assigned]

jobs:
  move-to-in-progress:
    runs-on: ubuntu-latest
    permissions:
      repository-projects: write
      issues: write
      contents: read

    steps:
      - name: Move Issue to In Progress Column
        env:
          GITHUB_TOKEN: ${{ secrets.ACTION_TOKEN }}
          OWNER_NAME: "f-mac-mows"
          PROJECT_NUMBER: "3" 
          COLUMN_NAME: "In Progress"
        run: |
          echo "🔍 프로젝트 정보 조회를 시작합니다... (Target: #$PROJECT_NUMBER)"

          # 1. gh 내장 명령어로 프로젝트의 글로벌 ID를 안전하게 추출합니다. (User/Org 자동 판별)
          PROJECT_ID=$(gh project list --owner "$OWNER_NAME" --format json | jq -r --argjson num "$PROJECT_NUMBER" '.projects[] | select(.number == $num) | .id')

          if [ -z "$PROJECT_ID" ] || [ "$PROJECT_ID" == "null" ]; then
            echo "❌ 프로젝트 ID를 찾지 못했습니다. f-mac-mows 계정에 3번 프로젝트가 비공개(Private) 상태이거나"
            echo "리포지토리 Settings -> Actions -> General에서 Workflow permissions가 'Read and write'로 되어있는지 다시 확인해주세요!"
            exit 1
          fi
          echo "🎯 찾은 프로젝트 ID: $PROJECT_ID"

          # 2. 이슈를 프로젝트 보드에 아이템으로 추가하고 해당 아이템 ID를 가져옵니다.
          echo "➕ 이슈를 프로젝트 보드에 추가하는 중..."
          ITEM_ID=$(gh project item-add "$PROJECT_NUMBER" --owner "$OWNER_NAME" --url "${{ github.event.issue.html_url }}" --format json | jq -r '.id')
          echo "📦 생성된 아이템 ID: $ITEM_ID"

          # 3. gh project 내장 필드 편집 명령어로 수동 GraphQL 없이 깔끔하게 'Status'를 'In Progress'로 변경합니다.
          echo "🚀 상태를 '$COLUMN_NAME'으로 변경합니다..."
          gh project item-edit --id "$ITEM_ID" --field "Status" --project-id "$PROJECT_ID" --single-select-option "$COLUMN_NAME"
          
          echo "✅ 모든 자동화 프로세스가 성공적으로 완료되었습니다!"