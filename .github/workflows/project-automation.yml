name: "Project Automation (Move to In Progress)"

on:
  issues:
    types: [assigned]

jobs:
  move-to-in-progress:
    runs-on: ubuntu-latest
    permissions:
      repository-projects: write
      issues: write
      contents: read

    steps:
      - name: Move Issue to In Progress Column
        env:
          # 🔒 반드시 사전에 등록하신 PAT 토큰(ACTION_TOKEN)이어야 프라이빗 보드가 뚫립니다!
          GITHUB_TOKEN: ${{ secrets.ACTION_TOKEN }}
          OWNER_NAME: "f-mac-mows" 
          PROJECT_NUMBER: 3 # 💡 숫자로 명시
          COLUMN_NAME: "In Progress"
        run: |
          echo "🔍 [1단계] 개인 계정($OWNER_NAME)의 3번 Private 프로젝트 ID 조회 중..."
          
          # GraphQL로 유저와 프로젝트 번호를 정확히 타겟팅합니다.
          RESPONSE=$(gh api graphql -f query='
            query($owner: String!, $number: Int!) {
              user(login: $owner) {
                projectV2(number: $number) { id }
              }
            }' -F owner="$OWNER_NAME" -F number=$PROJECT_NUMBER)

          # 에러 체크
          HAS_ERRORS=$(echo "$RESPONSE" | jq '.errors')
          if [ "$HAS_ERRORS" != "null" ]; then
            echo "❌ GitHub API 조회 실패!"
            echo "상세 에러 내용: $RESPONSE"
            exit 1
          fi

          PROJECT_ID=$(echo "$RESPONSE" | jq -r '.data.user.projectV2.id')
          if [ "$PROJECT_ID" == "null" ] || [ -z "$PROJECT_ID" ]; then
            echo "❌ 프로젝트 ID를 가져오지 못했습니다. 보드가 존재하지 않거나 토큰 권한이 부족합니다."
            exit 1
          fi
          echo "🎯 찾은 프로젝트 ID: $PROJECT_ID"


          echo "🔍 [2단계] 프로젝트 보드에 현재 이슈 추가 중..."
          ITEM_RESPONSE=$(gh api graphql -f query='
            mutation($project: ID!, $content: ID!) {
              addProjectV2ItemById(input: {projectId: $project, contentId: $content}) {
                item { id }
              }
            }' -F project="$PROJECT_ID" -F content="${{ github.event.issue.node_id }}")

          ITEM_ID=$(echo "$ITEM_RESPONSE" | jq -r '.data.addProjectV2ItemById.item.id')
          echo "📦 생성된 보드 아이템 ID: $ITEM_ID"


          echo "🔍 [3단계] 'Status' 필드 및 '$COLUMN_NAME' 옵션 ID 조회 중..."
          FIELDS=$(gh api graphql -f query='
            query($project: ID!) {
              node(id: $project) {
                ... on ProjectV2 {
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2FieldCommon { id name }
                      ... on ProjectV2SingleSelectField {
                        options { id name }
                      }
                    }
                  }
                }
              }
            }' -F project="$PROJECT_ID")

          STATUS_FIELD_ID=$(echo "$FIELDS" | jq -r '.data.node.fields.nodes[] | select(.name == "Status") | .id')
          OPTION_ID=$(echo "$FIELDS" | jq -r --arg col "$COLUMN_NAME" '.data.node.fields.nodes[] | select(.name == "Status") | .options[] | select(.name == $col) | .id')


          echo "🔍 [4단계] 카드 상태를 '$COLUMN_NAME'으로 이동 중..."
          gh api graphql -f query='
            mutation($project: ID!, $item: ID!, $field: ID!, $value: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $project,
                itemId: $item,
                fieldId: $field,
                value: { singleSelectOptionId: $value }
              }) { clientMutationId }
            }' -F project="$PROJECT_ID" -F item="$ITEM_ID" -F field="$STATUS_FIELD_ID" -F value="$OPTION_ID"
          
          echo "✅ [성공] 이슈가 완전히 '$COLUMN_NAME' 컬럼으로 배치되었습니다!"