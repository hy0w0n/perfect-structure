name: "Project Automation (Move to In Progress)"

on:
  issues:
    types: [assigned] # 이슈에 담당자가 지정되었을 때 트리거

jobs:
  move-to-in-progress:
    runs-on: ubuntu-latest
    permissions:
      repository-projects: write # 프로젝트 보드를 수정할 수 있는 권한 부여
      issues: write
    steps:
      - name: Move Issue to In Progress Column
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORGANIZATION_NAME: "f-mac-mows"
          PROJECT_NUMBER: "3"
          COLUMN_NAME: "In Progress"
        run: |
          PROJECT_ID=$(gh api graphql -f query='
            query($org: String!, $number: Int!) {
              user(login: $org) {
                projectV2(number: $number) { id }
              }
              organization(login: $org) {
                projectV2(number: $number) { id }
              }
            }' -F org="$ORGANIZATION_NAME" -F number=$PROJECT_NUMBER \
            --template '{{if .data.user.projectV2}}{{.data.user.projectV2.id}}{{else if .data.organization.projectV2}}{{.data.organization.projectV2.id}}{{end}}' | tr -d '[:space:]')

          if [ -z "$PROJECT_ID" ]; then
            echo "❌ 프로젝트를 찾을 수 없습니다. 설정한 Org 이름과 프로젝트 번호를 확인해주세요."
            exit 1
          fi

          echo "🎯 찾은 프로젝트 ID: $PROJECT_ID"

          # 2. 이슈를 해당 프로젝트에 아이템으로 링크(추가)하고 아이템 ID를 가져옵니다.
          ITEM_ID=$(gh api graphql -f query='
            mutation($project: ID!, $content: ID!) {
              addProjectV2ItemById(input: {projectId: $project, contentId: $content}) {
                item { id }
              }
            }' -F project="$PROJECT_ID" -F content="${{ github.event.issue.node_id }}" --template '{{.data.addProjectV2ItemById.item.id}}' | tr -d '[:space:]')

          # 3. 'Status' 필드의 ID와 'In Progress' 옵션의 ID를 조회합니다.
          FIELDS=$(gh api graphql -f query='
            query($project: ID!) {
              node(id: $project) {
                ... on ProjectV2 {
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2FieldCommon { id name }
                      ... on ProjectV2SingleSelectField {
                        options { id name }
                      }
                    }
                  }
                }
              }
            }' -F project="$PROJECT_ID")

          STATUS_FIELD_ID=$(echo "$FIELDS" | jq -r '.data.node.fields.nodes[] | select(.name == "Status") | .id')
          OPTION_ID=$(echo "$FIELDS" | jq -r --arg col "$COLUMN_NAME" '.data.node.fields.nodes[] | select(.name == "Status") | .options[] | select(.name == $col) | .id')

          # 4. 아이템의 Status 값을 'In Progress'로 업데이트합니다.
          gh api graphql -f query='
            mutation($project: ID!, $item: ID!, $field: ID!, $value: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $project,
                itemId: $item,
                fieldId: $field,
                value: { singleSelectOptionId: $value }
              }) { clientMutationId }
            }' -F project="$PROJECT_ID" -F item="$ITEM_ID" -F field="$STATUS_FIELD_ID" -F value="$OPTION_ID"
          
          echo "✅ 이슈가 성공적으로 '$COLUMN_NAME' 칼럼으로 이동되었습니다."